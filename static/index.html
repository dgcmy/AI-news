<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIニュース ダイジェスト</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface2: #f0f4f8;
      --border: #e2e8f0;
      --text: #1a202c;
      --muted: #64748b;
      --accent: #2563eb;
      --accent2: #4f46e5;
      --gold: #d97706;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", "Meiryo", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .logo-title {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .logo-sub,
    .date-sub,
    .status-msg,
    .article-date,
    footer {
      color: var(--muted);
    }

    .logo-sub,
    .date-sub {
      font-size: 0.75rem;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .date-box {
      text-align: right;
    }

    .date-main {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .spinner,
    .loading-ring,
    .notice-spinner {
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .spinner {
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 1.75rem 1.5rem 3rem;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
    }

    .count-badge {
      display: none;
      padding: 0.15rem 0.65rem;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.08);
      color: var(--accent);
      border: 1px solid rgba(37, 99, 235, 0.2);
      font-size: 0.75rem;
      font-weight: 600;
    }

    .date-nav {
      display: none;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .date-btn {
      padding: 0.25rem 0.65rem;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.75rem;
    }

    .date-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .notice {
      display: none;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      background: rgba(37, 99, 235, 0.06);
      border: 1px solid rgba(37, 99, 235, 0.15);
      color: var(--accent);
      font-size: 0.82rem;
    }

    .notice.show {
      display: flex;
    }

    .notice-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(37, 99, 235, 0.2);
      border-top-color: var(--accent);
      flex-shrink: 0;
    }

    .loading,
    .empty {
      text-align: center;
      padding: 4rem 1rem;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .loading-ring {
      width: 52px;
      height: 52px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    .col-right {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .section-label {
      margin-bottom: 0.75rem;
      padding-left: 0.25rem;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .news-grid {
      display: grid;
      gap: 0.85rem;
    }

    .news-card {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 1rem;
      padding: 1.1rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: inherit;
      text-decoration: none;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .news-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(37, 99, 235, 0.1);
    }

    .rank {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 0.9rem;
      font-weight: 800;
      margin-top: 2px;
    }

    .rank-gold { background: linear-gradient(135deg, #f59e0b, #ef4444); color: #fff; }
    .rank-silver { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; }
    .rank-bronze { background: linear-gradient(135deg, #cd7c2f, #a05c1e); color: #fff; }
    .rank-normal {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-wrap: wrap;
      margin-bottom: 0.45rem;
    }

    .source-tag {
      padding: 0.15rem 0.55rem;
      border-radius: 4px;
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .src-nikkei { background: #dc2626; }
    .src-openai { background: #10b981; }
    .src-anthropic { background: #7c3aed; }
    .src-google { background: #2563eb; }
    .src-meta { background: #0284c7; }
    .src-techcrunch { background: #d97706; }
    .src-venturebeat { background: #0891b2; }
    .src-verge { background: #e11d48; }
    .src-mit { background: #4f46e5; }
    .src-wired { background: #4b5563; }
    .src-ars { background: #be123c; }
    .src-ledge { background: #0d9488; }
    .src-default { background: #475569; }

    .card-title {
      margin-bottom: 0.45rem;
      font-size: 0.97rem;
      font-weight: 600;
      line-height: 1.45;
    }

    .card-summary {
      margin-bottom: 0.5rem;
      color: var(--muted);
      font-size: 0.83rem;
      line-height: 1.65;
    }

    .card-point {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.18rem 0.55rem;
      border-radius: 4px;
      color: var(--gold);
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      font-size: 0.72rem;
    }

    .article-date {
      font-size: 0.7rem;
    }

    footer {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.75rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    @media (max-width: 720px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .header-right {
        width: 100%;
        justify-content: space-between;
      }

      .columns {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">AI</div>
      <div>
        <div class="logo-title">AIニュース ダイジェスト</div>
        <div class="logo-sub">Powered by Claude AI</div>
      </div>
    </div>
    <div class="header-right">
      <div class="date-box">
        <div class="date-main" id="headerDate"></div>
        <div class="date-sub" id="lastUpdated"></div>
      </div>
      <button class="btn" id="refreshBtn" onclick="doRefresh()">
        <div class="spinner" id="btnSpinner"></div>
        <span id="btnLabel">更新</span>
      </button>
    </div>
  </header>

  <main>
    <div class="topbar">
      <div class="topbar-left">
        <span class="section-title">トップAIニュース</span>
        <span class="count-badge" id="countBadge"></span>
      </div>
      <span class="status-msg" id="statusMsg"></span>
    </div>

    <div class="notice" id="processingNotice">
      <div class="notice-spinner"></div>
      <span>ニュースを更新中です。完了までしばらくお待ちください...</span>
    </div>

    <div id="dateNav" class="date-nav"></div>

    <div id="content">
      <div class="loading">
        <div class="loading-ring"></div>
        <p>ニュースを読み込み中...</p>
      </div>
    </div>
  </main>

  <footer>
    ソース: 日経・OpenAI・Anthropic・Google DeepMind・Meta AI・TechCrunch・VentureBeat ほか |
    分類: <a href="https://www.anthropic.com" target="_blank" rel="noopener noreferrer">Claude AI</a>
  </footer>

  <script>
    let currentDate = null;
    let pollTimer = null;
    let refreshStartTime = null;

    const sourceClass = {
      "日経": "src-nikkei",
      "OpenAI": "src-openai",
      "Anthropic": "src-anthropic",
      "Google DeepMind": "src-google",
      "Meta AI": "src-meta",
      "TechCrunch": "src-techcrunch",
      "VentureBeat": "src-venturebeat",
      "The Verge": "src-verge",
      "MIT Technology Review": "src-mit",
      "Wired": "src-wired",
      "Ars Technica": "src-ars",
      "Ledge.ai": "src-ledge",
    };

    function getSourceClass(src) {
      return sourceClass[src] || "src-default";
    }

    function rankClass(n) {
      if (n === 1) return "rank-gold";
      if (n === 2) return "rank-silver";
      if (n === 3) return "rank-bronze";
      return "rank-normal";
    }

    function getJstTodayString() {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      }).formatToParts(new Date());
      const map = Object.fromEntries(parts.map(({ type, value }) => [type, value]));
      return `${map.year}-${map.month}-${map.day}`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";
      const d = new Date(`${dateStr}T00:00:00+09:00`);
      if (Number.isNaN(d.getTime())) return dateStr;
      return d.toLocaleDateString("ja-JP", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long",
        timeZone: "Asia/Tokyo",
      });
    }

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = value || "";
      return div.innerHTML;
    }

    function formatArticleDate(dateStr) {
      if (!dateStr) return "";

      const articleDate = new Date(dateStr);
      if (Number.isNaN(articleDate.getTime())) return dateStr;

      const todayJst = getJstTodayString();
      const articleJst = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      }).format(articleDate);

      if (articleJst === todayJst) return "今日";

      const today = new Date(`${todayJst}T00:00:00+09:00`);
      const target = new Date(`${articleJst}T00:00:00+09:00`);
      const days = Math.floor((today - target) / (1000 * 60 * 60 * 24));

      if (days === 1) return "昨日";
      if (days < 7) return `${days}日前`;

      return articleDate.toLocaleDateString("ja-JP", {
        month: "long",
        day: "numeric",
        timeZone: "Asia/Tokyo",
      });
    }

    function renderCard(article) {
      return `
        <a class="news-card" href="${escapeHtml(article.url)}" target="_blank" rel="noopener noreferrer">
          <div class="rank ${rankClass(article.rank)}">${article.rank || "?"}</div>
          <div class="card-body">
            <div class="card-meta">
              <span class="source-tag ${getSourceClass(article.source)}">${escapeHtml(article.source)}</span>
              ${article.published_at ? `<span class="article-date">${formatArticleDate(article.published_at)}</span>` : ""}
            </div>
            <div class="card-title">${escapeHtml(article.title)}</div>
            ${article.summary ? `<div class="card-summary">${escapeHtml(article.summary)}</div>` : ""}
            ${article.point ? `<span class="card-point">ポイント: ${escapeHtml(article.point)}</span>` : ""}
          </div>
        </a>
      `;
    }

    function renderSection(title, articles) {
      return `
        <div>
          <div class="section-label">${title}</div>
          <div class="news-grid">
            ${articles.length ? articles.map(renderCard).join("") : '<p style="color:var(--muted);font-size:0.85rem;padding:1rem 0">該当ニュースはありません</p>'}
          </div>
        </div>
      `;
    }

    function renderCards(articles) {
      if (!articles || !articles.length) {
        return `
          <div class="empty">
            <h2>ニュースがまだありません</h2>
            <p>「更新」ボタンでニュースを取得できます。</p>
          </div>
        `;
      }

      const latest = articles.filter((a) => a.category === "latest");
      const japan = articles.filter((a) => a.category === "japan");
      const overseas = articles.filter((a) => a.category === "overseas");

      return `
        <div class="columns">
          <div class="col-left">
            ${renderSection("最新AIニュース", latest)}
          </div>
          <div class="col-right">
            ${renderSection("日本の主要AIニュース", japan)}
            ${renderSection("海外の主要AIニュース", overseas)}
          </div>
        </div>
      `;
    }

    function renderNews(data) {
      const { articles, generated_at, date } = data;
      const badge = document.getElementById("countBadge");

      document.getElementById("headerDate").textContent = formatDate(date || getJstTodayString());

      if (generated_at) {
        const updated = new Date(generated_at);
        document.getElementById("lastUpdated").textContent = `更新: ${updated.toLocaleTimeString("ja-JP", {
          hour: "2-digit",
          minute: "2-digit",
        })}`;
      } else {
        document.getElementById("lastUpdated").textContent = "";
      }

      if (articles && articles.length) {
        badge.textContent = `${articles.length}件`;
        badge.style.display = "inline-flex";
        document.getElementById("statusMsg").textContent = "";
      } else {
        badge.style.display = "none";
        document.getElementById("statusMsg").textContent = "「更新」ボタンでニュースを取得できます";
      }

      document.getElementById("content").innerHTML = renderCards(articles);
    }

    async function loadNews(date) {
      try {
        const url = date ? `/api/news?date=${date}` : "/api/news";
        const res = await fetch(url);
        if (!res.ok) throw new Error("fetch failed");
        const data = await res.json();
        renderNews(data);
        return data;
      } catch (error) {
        document.getElementById("content").innerHTML = `
          <div class="empty">
            <h2>読み込みに失敗しました</h2>
            <p>ページを再読み込みするか、「更新」を押して再試行してください。</p>
          </div>
        `;
        return null;
      }
    }

    async function loadDates() {
      try {
        const res = await fetch("/api/dates");
        const data = await res.json();
        const dates = data.dates || [];
        const nav = document.getElementById("dateNav");

        if (dates.length > 1) {
          nav.style.display = "flex";
          nav.innerHTML = dates.slice(0, 7).map((date) => {
            const label = date === getJstTodayString() ? "今日" : date;
            return `<button class="date-btn ${date === currentDate ? "active" : ""}" onclick="switchDate('${date}')">${label}</button>`;
          }).join("");
        } else {
          nav.style.display = "none";
          nav.innerHTML = "";
        }
      } catch (error) {
        // Ignore date-nav errors to keep the main view usable.
      }
    }

    async function switchDate(date) {
      currentDate = date;
      await loadNews(date);
      await loadDates();
    }

    function setRefreshState(loading) {
      const btn = document.getElementById("refreshBtn");
      const spinner = document.getElementById("btnSpinner");
      const label = document.getElementById("btnLabel");

      btn.disabled = loading;
      spinner.style.display = loading ? "block" : "none";
      label.textContent = loading ? "更新中..." : "更新";
    }

    function showProcessingNotice(show) {
      document.getElementById("processingNotice").classList.toggle("show", show);
    }

    async function doRefresh() {
      setRefreshState(true);
      showProcessingNotice(true);
      refreshStartTime = Date.now();

      try {
        await fetch("/api/refresh");
      } catch (error) {
        // Polling below will still recover if the backend accepted the request.
      }

      let attempts = 0;
      clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        attempts += 1;

        try {
          const statusRes = await fetch("/api/status");
          const status = await statusRes.json();

          const newsRes = await fetch("/api/news");
          if (newsRes.ok) {
            const data = await newsRes.json();
            if (data.articles && data.articles.length > 0) {
              const updatedAt = new Date(data.generated_at || 0).getTime();
              if (updatedAt > refreshStartTime) {
                clearInterval(pollTimer);
                setRefreshState(false);
                showProcessingNotice(false);
                renderNews(data);
                await loadDates();
                return;
              }
            }
          }

          if (!status.is_running && attempts > 3) {
            clearInterval(pollTimer);
            setRefreshState(false);
            showProcessingNotice(false);
            await loadNews();
            await loadDates();
            return;
          }
        } catch (error) {
          // Retry until timeout.
        }

        if (attempts > 60) {
          clearInterval(pollTimer);
          setRefreshState(false);
          showProcessingNotice(false);
          document.getElementById("statusMsg").textContent = "タイムアウトしました。再度お試しください。";
        }
      }, 5000);
    }

    currentDate = getJstTodayString();
    document.getElementById("headerDate").textContent = formatDate(currentDate);

    (async () => {
      await loadNews();
      await loadDates();
    })();
  </script>
</body>
</html>
